# .gitlab-ci.yml - Your GitLab CI/CD Pipeline Definition

# This 'default' section defines global settings that apply to all jobs
# unless a job specifically overrides them.
default:
  # We use a Docker image that includes the Docker client to interact with the Docker daemon.
  image: docker:24.0.5
  # The 'services' keyword allows you to link other Docker images as services.
  # 'docker:24.0.5-dind' provides the Docker daemon (Docker-in-Docker) necessary
  # for building and running Docker images within the CI/CD environment.
  services:
    - docker:24.0.5-dind
  # The 'before_script' section defines commands that run before each job's script.
  # Here, we log into the GitLab Container Registry using predefined CI/CD variables.
  # This is essential for pushing your Docker images to the registry.
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - |
      for i in {1..30}; do
        docker info && break
        echo "Waiting for Docker to be ready..."
        sleep 1
      done
      # code from chatGPT

# 'stages' define the order of execution for your pipeline.
# Jobs within the same stage run in parallel, and stages run sequentially.
stages:
  - build
  - test
  - push

# 'variables' allow you to define custom variables or override predefined ones.
variables:
  # DOCKER_HOST and DOCKER_TLS_CERTDIR are crucial for secure communication
  # with the Docker daemon when using Docker-in-Docker.
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  # CONTAINER_IMAGE is a custom variable that constructs the full image name and tag.
  # $CI_REGISTRY_IMAGE: The address of the registry tied to this project.
  # $CI_COMMIT_REF_SLUG: A sanitized version of the branch or tag name,
  #                      suitable for use in Docker image tags (e.g., 'main', 'feature-branch-1').
  CONTAINER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

# --- Build Stage ---
# This job is responsible for building your Docker image.
build_job:
  stage: build
  script:
    # 'docker build --pull': Builds the Docker image from your Dockerfile.
    #   '--pull' ensures that base images are always the latest available.
    #   '-t $CONTAINER_IMAGE': Tags the image with the name defined in our variables.
    #   '.': Specifies that the Dockerfile is in the current directory.
    - docker build --pull -t $CONTAINER_IMAGE .
    # 'docker push': Uploads the newly built image to the GitLab Container Registry.
    - docker push $CONTAINER_IMAGE

# --- Test Stage ---
# This job pulls the newly built image and runs your application's tests inside the container.
test_job:
  stage: test
  script:
    # 'docker pull': Explicitly pulls the image to ensure the latest version
    #                is used, especially important with multiple runners or caches.
    - docker pull $CONTAINER_IMAGE
    # 'docker run': Executes your test command inside the container.
    #                ***IMPORTANT: Replace '/path/to/your/test/script.sh' with your actual test command.***
    - docker run $CONTAINER_IMAGE src/frontend/tests/utils.test.ts

# --- Push Stage (Optional for 'main' branch) ---
# This job tags the successfully built and tested image as 'latest' and pushes it.
# This is typically done for stable releases from your main development branch.
push_latest_job:
  stage: push
  script:
    # Pull the image built in the previous stage to ensure we're tagging the correct one.
    - docker pull $CONTAINER_IMAGE
    # 'docker tag': Creates an additional tag for the image, marking it as 'latest'.
    - docker tag $CONTAINER_IMAGE $CI_REGISTRY_IMAGE:latest
    # Push the 'latest' tagged image to the registry.
    - docker push $CI_REGISTRY_IMAGE:latest
  # 'rules' define when a job should run. This job only runs when changes
  # are committed to the 'main' branch, ensuring 'latest' always points to a stable version.
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
