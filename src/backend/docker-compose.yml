version: "3.9"  # optional, keep for compatibility

services:
  db:
    image: postgres:15
    container_name: seng350_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./uvic_rooms.csv:/docker-entrypoint-initdb.d/uvic_rooms.csv:ro

  backend:
    build: .
    container_name: seng350_backend
    command: npm run dev         # runs your existing "dev" script
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  db_data:
