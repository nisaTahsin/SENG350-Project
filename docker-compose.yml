version: "3.9"

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./src/backend/.env
    volumes:
      - ./src/backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
      - ./data/uvic_rooms.csv:/usr/data/uvic_rooms.csv:ro
    depends_on:
     db:
      condition: service_healthy
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./src/frontend/src:/app/src
      - ./src/frontend/public:/app/public
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_BACKEND_URL=http://localhost:4000
      - REACT_APP_DEBUG=true
    command: npm start

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uvic_rooms
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./src/backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./data/uvic_rooms.csv:/docker-entrypoint-initdb.d/uvic_rooms.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uvic_rooms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  backend_node_modules:
    # keep container-installed node_modules so dev tooling (nodemon/ts-node) remains available
    driver: local
